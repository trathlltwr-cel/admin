<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم شاو بروست</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#170a12; --panel:#26101d; --panel-alt:#35162a;
  --gold:#f0c77e; --gold-soft:#f6dba0; --paprika:#f5941f;
  --cream:#f6ead6; --muted:#cda9c0; --line:rgba(240,199,126,.16);
  --magenta:#b3175f; --magenta-deep:#7a0f42;
  --green:#3fb872; --red:#e0503f;
  --shadow:0 20px 50px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--cream);font-family:'Cairo',sans-serif;min-height:100vh;}
.display{font-family:'Lalezar',cursive;}
button,input,select,textarea{font-family:'Cairo',sans-serif;}
img{max-width:100%;display:block;}
::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-thumb{background:var(--gold);border-radius:10px;}

/* ============ تنبيه إعدادات ناقصة ============ */
#configWarning{
  display:none;position:fixed;top:0;left:0;right:0;z-index:1000;
  background:var(--red);color:#fff;text-align:center;padding:10px 16px;font-size:13.5px;font-weight:700;
}

/* ============ تسجيل الدخول ============ */
#loginScreen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;
}
.login-box{
  background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px 34px;
  width:340px;max-width:90vw;text-align:center;box-shadow:var(--shadow);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.login-box h2{font-family:'Lalezar',cursive;color:var(--gold-soft);font-size:26px;margin-bottom:8px;}
.login-box p{color:var(--muted);font-size:13.5px;margin-bottom:22px;}
.login-box input{
  width:100%;background:var(--panel-alt);border:1px solid var(--line);border-radius:12px;
  padding:13px 14px;color:var(--cream);font-size:15px;margin-bottom:14px;outline:none;text-align:center;
  letter-spacing:2px;transition:border-color .3s;
}
.login-box input:focus{border-color:var(--gold);}
.login-box button{
  width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),#c9852f);
  color:#1a1109;font-weight:800;font-size:15px;cursor:pointer;transition:transform .25s ease;
}
.login-box button:hover{transform:translateY(-2px);}
.login-error{color:var(--red);font-size:13px;margin-top:10px;display:none;}

/* ============ الهيكل العام ============ */
.app{display:none;min-height:100vh;flex-direction:column;}
header{
  display:flex;align-items:center;justify-content:space-between;padding:16px 5%;
  background:rgba(23,10,18,.85);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:40px;}
.brand h1{font-size:16px;color:var(--cream);font-weight:800;}
.brand span{display:block;font-size:12px;color:var(--muted);font-weight:400;}
.logout-btn{background:none;border:1px solid var(--line);color:var(--muted);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;transition:all .3s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.tabs-bar{display:flex;gap:8px;padding:14px 5% 0;flex-wrap:wrap;}
.tab-btn{
  padding:11px 22px;border-radius:14px 14px 0 0;border:1px solid var(--line);border-bottom:none;
  background:var(--panel);color:var(--muted);cursor:pointer;font-weight:700;font-size:14.5px;
  transition:all .3s ease;
}
.tab-btn.active{background:var(--panel-alt);color:var(--gold-soft);}
.tab-btn:hover{color:var(--gold-soft);}

main{flex:1;padding:24px 5% 60px;max-width:1300px;margin:0 auto;width:100%;}
.view{display:none;animation:fadeIn .5s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:22px;}
.toolbar select, .toolbar input{
  background:var(--panel-alt);border:1px solid var(--line);border-radius:10px;padding:9px 14px;
  color:var(--cream);font-size:13.5px;outline:none;
}
.icon-btn{
  background:var(--panel-alt);border:1px solid var(--line);color:var(--gold-soft);
  padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:700;
  transition:all .3s ease;display:inline-flex;align-items:center;gap:6px;
}
.icon-btn:hover{border-color:var(--gold);background:rgba(240,199,126,.08);}
.badge-count{
  background:var(--paprika);color:#1a1109;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:800;
}

/* ============ بطاقات الطلبات ============ */
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;}
.order-card{
  background:linear-gradient(160deg,var(--panel),var(--panel-alt));border:1px solid var(--line);
  border-radius:18px;padding:20px;transition:transform .3s ease, box-shadow .3s ease;
  animation:cardIn .4s ease;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.order-card:hover{box-shadow:var(--shadow);}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.order-type-chip{
  font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;
}
.order-type-chip.local{background:rgba(240,199,126,.15);color:var(--gold-soft);}
.order-type-chip.delivery{background:rgba(179,23,95,.2);color:#ff8fc0;}
.order-time{color:var(--muted);font-size:12px;}
.order-card h4{font-size:16.5px;color:var(--cream);margin-bottom:4px;}
.order-card .phone{color:var(--muted);font-size:13px;margin-bottom:10px;}
.order-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:12px;}
.order-meta b{color:var(--gold-soft);}
.order-total{font-size:18px;font-weight:800;color:var(--gold-soft);margin-bottom:14px;}
.receipt-thumb{
  width:100%;height:110px;object-fit:cover;border-radius:10px;margin-bottom:14px;cursor:pointer;
  border:1px solid var(--line);transition:transform .3s ease;
}
.receipt-thumb:hover{transform:scale(1.02);}
.status-row{display:flex;gap:8px;flex-wrap:wrap;}
.status-btn{
  flex:1;min-width:90px;padding:9px 10px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel-alt);color:var(--muted);font-size:12.5px;font-weight:700;cursor:pointer;
  transition:all .25s ease;
}
.status-btn.active{background:var(--gold);color:#1a1109;border-color:var(--gold);}
.status-btn:hover{border-color:var(--gold);}
.items-toggle{color:var(--gold-soft);font-size:12.5px;cursor:pointer;margin-top:10px;display:inline-block;}
.items-list{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;}
.items-list.show{display:block;}
.items-list div{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:3px 0;}

/* ============ المنتجات ============ */
.product-form{
  background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:30px;
  display:grid;grid-template-columns:1fr 1fr;gap:14px;
}
.product-form h3{grid-column:1/-1;font-size:17px;color:var(--gold-soft);margin-bottom:6px;}
.product-form input, .product-form select, .product-form textarea{
  background:var(--panel-alt);border:1px solid var(--line);border-radius:10px;padding:11px 14px;
  color:var(--cream);font-size:14px;outline:none;transition:border-color .3s;width:100%;
}
.product-form input:focus, .product-form select:focus, .product-form textarea:focus{border-color:var(--gold);}
.product-form textarea{grid-column:1/-1;resize:vertical;min-height:60px;}
.img-upload{
  grid-column:1/-1;display:flex;align-items:center;gap:16px;border:1.5px dashed var(--line);
  border-radius:12px;padding:14px;cursor:pointer;transition:border-color .3s;
}
.img-upload:hover{border-color:var(--gold);}
.img-upload img{width:70px;height:70px;object-fit:cover;border-radius:10px;display:none;}
.img-upload img.show{display:block;}
.img-upload span{color:var(--muted);font-size:13.5px;}
.submit-btn{
  grid-column:1/-1;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--paprika),#c9852f);
  color:#1a1109;font-weight:800;font-size:15px;cursor:pointer;transition:transform .25s ease;
}
.submit-btn:hover{transform:translateY(-2px);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
.product-card{
  background:linear-gradient(160deg,var(--panel),var(--panel-alt));border:1px solid var(--line);
  border-radius:16px;overflow:hidden;transition:transform .3s ease;
}
.product-card:hover{transform:translateY(-4px);}
.product-card img{width:100%;height:130px;object-fit:cover;}
.product-card .p-body{padding:14px 16px;}
.product-card h5{font-size:15px;color:var(--cream);margin-bottom:4px;}
.product-card p{font-size:12.5px;color:var(--muted);margin-bottom:8px;min-height:32px;}
.product-card .p-price{color:var(--gold-soft);font-weight:800;margin-bottom:10px;}
.p-actions{display:flex;gap:8px;}
.p-actions button{
  flex:1;padding:7px;border-radius:8px;border:1px solid var(--line);background:transparent;
  color:var(--muted);cursor:pointer;font-size:12px;transition:all .25s ease;
}
.p-actions button.del:hover{border-color:var(--red);color:var(--red);}
.p-actions button.toggle:hover{border-color:var(--green);color:var(--green);}
.unavailable{opacity:.5;}

/* ============ QR ============ */
.qr-setup{
  background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:28px;
  display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;
}
.qr-setup .field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px;}
.qr-setup label{font-size:13px;color:var(--muted);}
.qr-setup input{
  background:var(--panel-alt);border:1px solid var(--line);border-radius:10px;padding:11px 14px;
  color:var(--cream);font-size:14px;outline:none;
}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.qr-card{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center;
  animation:cardIn .4s ease;
}
.qr-card img{width:100%;border-radius:10px;margin-bottom:10px;background:#fff;padding:8px;}
.qr-card h5{font-family:'Lalezar',cursive;color:var(--gold-soft);font-size:18px;margin-bottom:4px;}
.qr-card small{color:var(--muted);font-size:11px;word-break:break-all;display:block;margin-bottom:8px;}
.qr-card a{font-size:12.5px;color:var(--gold-soft);text-decoration:underline;}

@media print{
  header, .tabs-bar, .toolbar, .qr-setup, .print-btn, #configWarning{display:none!important;}
  main{padding:0;}
  .qr-grid{grid-template-columns:repeat(3,1fr);}
  .qr-card{break-inside:avoid;border:1px solid #ccc;}
  body{background:#fff;color:#000;}
}

/* ============ مودال ============ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;
  z-index:200;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-overlay img{max-width:90vw;max-height:85vh;border-radius:12px;}

.toast{
  position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(140px);
  background:var(--panel);border:1px solid var(--gold);color:var(--cream);padding:14px 22px;
  border-radius:14px;z-index:300;opacity:0;transition:all .5s cubic-bezier(.34,1.56,.64,1);font-size:14px;
  max-width:90vw;text-align:center;line-height:1.6;
}
.toast.error{border-color:var(--red);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;color:var(--muted);padding:60px 20px;font-size:14.5px;}
</style>
</head>
<body>

<div id="configWarning">⚠️ لسه ما حطيتش مفتاح Supabase الصحيح — عدّل SUPABASE_ANON_KEY في أعلى ملف السكريبت</div>

<div id="loginScreen">
  <div class="login-box">
    <h2>لوحة شاو بروست</h2>
    <p>أدخل كلمة المرور للدخول للوحة التحكم</p>
    <input type="password" id="passInput" placeholder="••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">دخول</button>
    <div class="login-error" id="loginError">كلمة المرور غير صحيحة</div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg">
        <path d="M120 14c-22-10-52 2-52 28c0 20 18 32 36 26c13-4 17-18 7-25c-8-6-18 1-14 11" fill="none" stroke="var(--paprika)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="98" cy="52" r="7" fill="var(--paprika)"/>
        <path d="M10 102c34-24 70 22 104-2c26-18 50 6 80-14l14 14c-32 22-58-4-86 14c-36 22-70-22-104 2c-8 5-14-8-8-14z" fill="var(--gold)"/>
      </svg>
      <div><h1>لوحة تحكم شاو بروست<span>إدارة الطلبات والمنتجات ورموز الطاولات</span></h1></div>
    </div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </header>

  <div class="tabs-bar">
    <button class="tab-btn active" data-view="orders">🧾 الطلبات</button>
    <button class="tab-btn" data-view="products">🍗 المنتجات</button>
    <button class="tab-btn" data-view="qr">🔗 QR الطاولات</button>
  </div>

  <main>
    <!-- ============ الطلبات ============ -->
    <section class="view active" id="view-orders">
      <div class="toolbar">
        <button class="icon-btn" onclick="loadOrders(true)">🔄 تحديث <span class="badge-count" id="newOrdersBadge" style="display:none;">0</span></button>
        <select id="filterStatus" onchange="renderOrders()">
          <option value="all">كل الحالات</option>
          <option value="جديد">جديد</option>
          <option value="قيد التحضير">قيد التحضير</option>
          <option value="جاهز">جاهز</option>
          <option value="تم التسليم">تم التسليم</option>
        </select>
        <select id="filterType" onchange="renderOrders()">
          <option value="all">الكل (محلي وسفري)</option>
          <option value="محلي">محلي فقط</option>
          <option value="سفري">سفري فقط</option>
        </select>
        <label style="color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="autoRefresh" checked onchange="toggleAutoRefresh()"> تحديث تلقائي
        </label>
      </div>
      <div class="orders-grid" id="ordersGrid"></div>
    </section>

    <!-- ============ المنتجات ============ -->
    <section class="view" id="view-products">
      <div class="product-form">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <select id="pCategory">
          <option value="broast">بروست دجاج</option>
          <option value="burger">برجر وسندويشات</option>
          <option value="side">أطباق جانبية</option>
          <option value="drink">مشروبات</option>
        </select>
        <input type="number" id="pPrice" placeholder="السعر (ج.س)">
        <input type="text" id="pIcon" placeholder="إيموجي مصغر (اختياري) مثال 🍗" maxlength="4">
        <textarea id="pDesc" placeholder="وصف قصير للمنتج"></textarea>
        <label class="img-upload" for="pImage">
          <img id="pImagePreview" alt="معاينة">
          <span id="pImageLabel">📷 اضغط لاختيار صورة المنتج</span>
        </label>
        <input type="file" id="pImage" accept="image/*" style="display:none" onchange="handleProductImage(this)">
        <button class="submit-btn" id="pSubmitBtn" onclick="addProduct()">إضافة المنتج للقائمة</button>
      </div>
      <div class="toolbar">
        <button class="icon-btn" onclick="loadProducts()">🔄 تحديث القائمة</button>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </section>

    <!-- ============ QR ============ -->
    <section class="view" id="view-qr">
      <div class="qr-setup">
        <div class="field">
          <label>رابط الموقع (بعد رفعه على GitHub Pages مثلًا)</label>
          <input type="text" id="qrBaseUrl" placeholder="https://username.github.io/shaoobroast/">
        </div>
        <div class="field" style="max-width:140px;">
          <label>عدد الطاولات</label>
          <input type="number" id="qrTableCount" value="10" min="1" max="100">
        </div>
        <button class="icon-btn" onclick="generateQRCodes()">⚡ توليد الرموز</button>
        <button class="icon-btn print-btn" onclick="window.print()">🖨️ طباعة الكل</button>
      </div>
      <div class="qr-grid" id="qrGrid"></div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="imgModal" onclick="this.classList.remove('show')">
  <img id="modalImg" src="" alt="">
</div>
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
/* ==========================================================================
   إعدادات Supabase
   ==========================================================================
   1) SUPABASE_URL: رابط مشروعك، من Project Settings → API
   2) SUPABASE_ANON_KEY: المفتاح العام، من Project Settings → API Keys
      - لو مشروعك جديد: روح تبويب "Publishable and secret API keys"
        وانسخ الـ Publishable key (بيبدأ بـ sb_publishable_...)
      - لو مشروعك قديم: ممكن تستخدم الـ anon key من تبويب
        "Legacy anon, service_role API keys" (بيبدأ بـ eyJ...)
   ========================================================================== */
const SUPABASE_URL = "https://zhxzrmrnhjdcmqzjigkk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoeHpybXJuaGpkY21xemppZ2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTAwMjgsImV4cCI6MjA5ODc2NjAyOH0.RepSFwT5LmGeM5Jor8IyScLIQfM2scvEKJRKsVPmcOI";

/* كلمة مرور الدخول للوحة - غيّرها لكلمة سرك الخاصة */
const ADMIN_PASSWORD = "KIMO";

const headers = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json'
};

/* تنبيه لو المفتاح لسه ما اتبدلش */
if(SUPABASE_ANON_KEY === "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoeHpybXJuaGpkY21xemppZ2trIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTAwMjgsImV4cCI6MjA5ODc2NjAyOH0.RepSFwT5LmGeM5Jor8IyScLIQfM2scvEKJRKsVPmcOI" || SUPABASE_URL.includes("YOUR_PROJECT")){
  document.getElementById('configWarning').style.display = 'block';
}

/* ============ استخراج رسالة خطأ واضحة من رد Supabase ============ */
async function extractError(res){
  try{
    const data = await res.json();
    return data.message || data.msg || data.error_description || data.error || JSON.stringify(data);
  }catch(e){
    return `HTTP ${res.status} ${res.statusText}`;
  }
}

/* ============ تسجيل الدخول ============ */
function tryLogin(){
  const val = document.getElementById('passInput').value;
  if(val === ADMIN_PASSWORD){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadOrders(); loadProducts();
    startAutoRefresh();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout(){
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passInput').value = '';
  clearInterval(refreshTimer);
}

/* ============ تبديل التبويبات ============ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
  });
});

function showToast(msg, isError){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), isError ? 5000 : 3000);
}
function openImgModal(src){
  document.getElementById('modalImg').src = src;
  document.getElementById('imgModal').classList.add('show');
}

/* ============ الطلبات ============ */
let ordersCache = [];
let lastKnownCount = 0;
let refreshTimer = null;

async function loadOrders(manual){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=created_at.desc&limit=100`, { headers });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    const data = await res.json();
    ordersCache = data;
    renderOrders();
    if(lastKnownCount === 0) lastKnownCount = data.length;
    else if(data.length > lastKnownCount){
      document.getElementById('newOrdersBadge').style.display='inline-block';
      document.getElementById('newOrdersBadge').textContent = data.length - lastKnownCount;
      showToast('📥 وصل طلب جديد!');
    }
    if(manual){ lastKnownCount = data.length; document.getElementById('newOrdersBadge').style.display='none'; }
  }catch(err){
    console.error(err);
    if(manual) showToast('فشل تحميل الطلبات: ' + err.message, true);
  }
}

function renderOrders(){
  const grid = document.getElementById('ordersGrid');
  const statusF = document.getElementById('filterStatus').value;
  const typeF = document.getElementById('filterType').value;
  let list = ordersCache;
  if(statusF!=='all') list = list.filter(o=>o.status===statusF);
  if(typeF!=='all') list = list.filter(o=>o.order_type===typeF);

  if(list.length===0){ grid.innerHTML = '<div class="empty-state">لا توجد طلبات مطابقة</div>'; return; }

  grid.innerHTML = list.map(o=>{
    const time = new Date(o.created_at).toLocaleString('ar-EG',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
    const typeClass = o.order_type==='محلي' ? 'local' : 'delivery';
    const statuses = ['جديد','قيد التحضير','جاهز','تم التسليم'];
    return `
    <div class="order-card" data-id="${o.id}">
      <div class="order-head">
        <span class="order-type-chip ${typeClass}">${o.order_type==='محلي'?'🏠 محلي':'🛵 سفري'}</span>
        <span class="order-time">${time}</span>
      </div>
      <h4>${o.customer_name || 'بدون اسم'}</h4>
      <div class="phone">📞 ${o.customer_phone || '—'}</div>
      <div class="order-meta">
        ${o.order_type==='محلي' ? `<span>🪑 طاولة <b>${o.table_number || '—'}</b></span>` : `<span>📍 <b>${o.delivery_address || '—'}</b></span>`}
      </div>
      <div class="order-total">${Number(o.total).toLocaleString()} ج.س</div>
      ${o.receipt_url ? `<img class="receipt-thumb" src="${o.receipt_url}" onclick="openImgModal('${o.receipt_url}')" alt="إشعار التحويل">` : ''}
      <div class="status-row">
        ${statuses.map(s=>`<button class="status-btn ${o.status===s?'active':''}" onclick="updateStatus('${o.id}','${s}')">${s}</button>`).join('')}
      </div>
      <span class="items-toggle" onclick="toggleItems('${o.id}', this)">▾ عرض تفاصيل الطلب</span>
      <div class="items-list" id="items-${o.id}"></div>
    </div>`;
  }).join('');
}

async function updateStatus(id, status){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
      method:'PATCH', headers, body: JSON.stringify({status})
    });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    const o = ordersCache.find(x=>x.id===id);
    if(o) o.status = status;
    renderOrders();
    showToast('تم تحديث حالة الطلب');
  }catch(err){ console.error(err); showToast('فشل تحديث الحالة: ' + err.message, true); }
}

async function toggleItems(orderId, el){
  const box = document.getElementById('items-'+orderId);
  if(box.classList.contains('show')){ box.classList.remove('show'); el.textContent='▾ عرض تفاصيل الطلب'; return; }
  el.textContent = '⏳ جاري التحميل...';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/order_items?order_id=eq.${orderId}&select=*`, { headers });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    const items = await res.json();
    box.innerHTML = items.map(i=>`<div><span>${i.item_name} × ${i.quantity}</span><span>${Number(i.subtotal).toLocaleString()} ج.س</span></div>`).join('') || '<div>لا توجد عناصر</div>';
    box.classList.add('show');
    el.textContent = '▴ إخفاء التفاصيل';
  }catch(err){
    el.textContent = '▾ عرض تفاصيل الطلب';
    showToast('فشل تحميل عناصر الطلب: ' + err.message, true);
  }
}

function toggleAutoRefresh(){
  if(document.getElementById('autoRefresh').checked) startAutoRefresh();
  else clearInterval(refreshTimer);
}
function startAutoRefresh(){
  clearInterval(refreshTimer);
  refreshTimer = setInterval(()=>loadOrders(false), 10000);
}

/* ============ المنتجات ============ */
let productImageData = null;

function handleProductImage(input){
  const file = input.files[0];
  if(!file) return;
  productImageData = { file, fileName: file.name.replace(/\s+/g,'_'), mimeType: file.type };
  const reader = new FileReader();
  reader.onload = e=>{
    const img = document.getElementById('pImagePreview');
    img.src = e.target.result; img.classList.add('show');
    document.getElementById('pImageLabel').textContent = '✓ '+file.name;
  };
  reader.readAsDataURL(file);
}

async function addProduct(){
  const name = document.getElementById('pName').value.trim();
  const category = document.getElementById('pCategory').value;
  const price = parseFloat(document.getElementById('pPrice').value);
  const desc = document.getElementById('pDesc').value.trim();
  const icon = document.getElementById('pIcon').value.trim() || '🍽️';

  if(!name || !price){ showToast('اكتب اسم المنتج والسعر على الأقل', true); return; }

  const btn = document.getElementById('pSubmitBtn');
  btn.disabled = true; btn.textContent = 'جاري الإضافة...';

  try{
    let imageUrl = null;
    if(productImageData){
      const path = `${Date.now()}_${productImageData.fileName}`;
      const up = await fetch(`${SUPABASE_URL}/storage/v1/object/menu-images/${path}`, {
        method:'POST',
        headers:{ 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': productImageData.mimeType },
        body: productImageData.file
      });
      if(!up.ok){ const msg = await extractError(up); throw new Error('فشل رفع الصورة: ' + msg); }
      imageUrl = `${SUPABASE_URL}/storage/v1/object/public/menu-images/${path}`;
    }

    const res = await fetch(`${SUPABASE_URL}/rest/v1/menu_items`, {
      method:'POST', headers,
      body: JSON.stringify({ name, category, price, description:desc, icon, image_url:imageUrl, available:true })
    });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }

    showToast('تمت إضافة المنتج بنجاح ✓');
    document.getElementById('pName').value='';
    document.getElementById('pPrice').value='';
    document.getElementById('pDesc').value='';
    document.getElementById('pIcon').value='';
    document.getElementById('pImage').value='';
    document.getElementById('pImagePreview').classList.remove('show');
    document.getElementById('pImageLabel').textContent = '📷 اضغط لاختيار صورة المنتج';
    productImageData = null;
    loadProducts();
  }catch(err){
    console.error(err);
    showToast('حصل خطأ أثناء إضافة المنتج: ' + err.message, true);
  }
  finally{ btn.disabled=false; btn.textContent='إضافة المنتج للقائمة'; }
}

async function loadProducts(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?select=*&order=created_at.desc`, { headers });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    const data = await res.json();
    const grid = document.getElementById('productsGrid');
    if(data.length===0){ grid.innerHTML = '<div class="empty-state">لا توجد منتجات بعد، أضف أول منتج من الفورم أعلاه</div>'; return; }
    grid.innerHTML = data.map(p=>`
      <div class="product-card ${p.available?'':'unavailable'}">
        ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}">` : `<div style="height:130px;display:flex;align-items:center;justify-content:center;font-size:44px;background:var(--panel-alt);">${p.icon||'🍽️'}</div>`}
        <div class="p-body">
          <h5>${p.icon||''} ${p.name}</h5>
          <p>${p.description||''}</p>
          <div class="p-price">${Number(p.price).toLocaleString()} ج.س</div>
          <div class="p-actions">
            <button class="toggle" onclick="toggleAvailability('${p.id}', ${p.available})">${p.available?'إخفاء':'إظهار'}</button>
            <button class="del" onclick="deleteProduct('${p.id}')">حذف</button>
          </div>
        </div>
      </div>`).join('');
  }catch(err){
    console.error(err);
    showToast('فشل تحميل المنتجات: ' + err.message, true);
  }
}

async function toggleAvailability(id, current){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?id=eq.${id}`, {
      method:'PATCH', headers, body: JSON.stringify({available: !current})
    });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    loadProducts();
  }catch(err){ console.error(err); showToast('فشل تحديث الحالة: ' + err.message, true); }
}
async function deleteProduct(id){
  if(!confirm('متأكد من حذف المنتج؟')) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/menu_items?id=eq.${id}`, { method:'DELETE', headers });
    if(!res.ok){ const msg = await extractError(res); throw new Error(msg); }
    showToast('تم حذف المنتج');
    loadProducts();
  }catch(err){ console.error(err); showToast('فشل حذف المنتج: ' + err.message, true); }
}

/* ============ توليد QR للطاولات ============ */
function generateQRCodes(){
  let base = document.getElementById('qrBaseUrl').value.trim();
  const count = parseInt(document.getElementById('qrTableCount').value) || 10;
  if(!base){ showToast('اكتب رابط الموقع أولًا', true); return; }
  if(!base.endsWith('/') && !base.includes('?')) base += '/';

  const grid = document.getElementById('qrGrid');
  let html = '';
  for(let i=1;i<=count;i++){
    const url = `${base}?table=${i}`;
    const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}`;
    html += `
      <div class="qr-card">
        <img src="${qrImg}" alt="QR طاولة ${i}">
        <h5>طاولة رقم ${i}</h5>
        <small>${url}</small>
        <a href="${qrImg}" target="_blank">فتح/تحميل الصورة</a>
      </div>`;
  }
  grid.innerHTML = html;
  showToast(`تم توليد ${count} رمز QR`);
}
